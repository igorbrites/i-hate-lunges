name: Fetch Memes

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  fetch-memes:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: Generate memes via Imgflip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        IMGFLIP_USERNAME: ${{ secrets.IMGFLIP_USERNAME }}
        IMGFLIP_PASSWORD: ${{ secrets.IMGFLIP_PASSWORD }}
      run: node scripts/fetch-memes.mjs

    - name: Check for new memes
      id: check
      run: |
        if [[ -n "$(git status --porcelain public/images/memes/ src/data/memes/)" ]]; then
          echo "has_new=true" >> "$GITHUB_OUTPUT"
          echo "New memes found"
        else
          echo "has_new=false" >> "$GITHUB_OUTPUT"
          echo "No new memes"
        fi

    - name: Create PR with new memes
      if: steps.check.outputs.has_new == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        BRANCH="chore/memes-$(date +%Y%m%d)"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -b "$BRANCH"
        git add public/images/memes/ src/data/memes/
        git commit -m "chore: add new memes via Imgflip

        Automated meme generation via Imgflip + GitHub Models."
        git push origin "$BRANCH"

        SUMMARY=""
        if [[ -f /tmp/meme-summary.md ]]; then
          SUMMARY=$(cat /tmp/meme-summary.md)
        fi

        gh pr create \
          --base main \
          --head "$BRANCH" \
          --title "chore: new memes via Imgflip ($(date +%Y-%m-%d))" \
          --body "## New Memes

        Automated meme generation using Imgflip templates + GitHub Models AI captions.

        ### Memes

        ${SUMMARY}

        ---

        Review the images and captions before merging. Merging will trigger a deploy to Cloudflare Pages."
